{% load i18n %}

<div
  class="ui-toast ui-toast--{{ variant|default:'info' }}"
  data-ui-toast
  data-duration="{{ duration|default:'5000' }}"
  role="status"
  aria-live="polite"
>
  <span class="ui-toast__rail" aria-hidden="true"></span>

  <div class="ui-toast__icon" aria-hidden="true">
    {% if variant == "error" %}
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"></circle>
        <path d="M12 8v5M12 16h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
      </svg>
    {% elif variant == "success" %}
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"></circle>
        <path d="M8 12.5l2.7 2.7L16.5 9.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    {% else %}
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    {% endif %}
    <span class="ui-toast__dot"></span>
  </div>

  <div class="ui-toast__body">
    {% if title %}
      <p class="ui-toast__title">{{ title }}</p>
    {% endif %}
    {% if message %}
      <p class="ui-toast__message">{{ message }}</p>
    {% endif %}

    <div class="ui-toast__progress">
      <span class="ui-toast__progress-fill"></span>
    </div>
  </div>

  <button type="button" class="ui-toast__close" data-toast-close aria-label="{% translate 'Cerrar notificacion' %}">
    <svg viewBox="0 0 14 14" fill="none" aria-hidden="true">
      <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
    </svg>
  </button>
</div>
