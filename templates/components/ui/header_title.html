<div class="ui-brand-header{% if class_name %} {{ class_name }}{% endif %}">
  {% if logo_src %}
    <img
      class="ui-brand-header__logo"
      src="{{ logo_src }}"
      alt="{{ logo_alt|default:title|default:'Logo' }}"
    >
  {% endif %}

  <div class="ui-brand-header__copy">
    {% if eyebrow %}
      <p class="ui-brand-header__eyebrow">{{ eyebrow }}</p>
    {% endif %}

    {% if title %}
      <h1 class="ui-brand-header__title">{{ title }}</h1>
    {% endif %}

    {% if description %}
      <p class="ui-brand-header__description">{{ description }}</p>
    {% endif %}
  </div>
</div>
