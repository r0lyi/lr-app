<div class="ui-field{% if full_width == False %}{% else %} ui-field--full{% endif %}{% if wrapper_class %} {{ wrapper_class }}{% endif %}">
  {% if label %}
    <label class="ui-field__label" for="{{ id|default:name }}">{{ label }}</label>
  {% endif %}

  <div class="ui-field__control">
    <input
      class="ui-input ui-input--date ui-input--has-right-icon{% if error %} ui-input--error{% endif %}{% if class_name %} {{ class_name }}{% endif %}"
      type="date"
      id="{{ id|default:name }}"
      name="{{ name }}"
      {% if value or value == '' %}value="{{ value }}"{% endif %}
      {% if required %}required{% endif %}
      {% if disabled %}disabled{% endif %}
      {% if readonly %}readonly{% endif %}
      {% if min %}min="{{ min }}"{% endif %}
      {% if max %}max="{{ max }}"{% endif %}
    />
    <span class="ui-field__icon ui-field__icon--right" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M8 3V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M16 3V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <rect x="4" y="5" width="16" height="15" rx="2" stroke="currentColor" stroke-width="2"/>
        <path d="M4 10H20" stroke="currentColor" stroke-width="2"/>
      </svg>
    </span>
  </div>

  {% if error %}
    <p class="ui-field__feedback ui-field__feedback--error">
      <svg class="ui-field__feedback-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"></circle>
        <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
      </svg>
      {{ error }}
    </p>
  {% elif hint %}
    <p class="ui-field__feedback ui-field__feedback--hint">{{ hint }}</p>
  {% endif %}
</div>
