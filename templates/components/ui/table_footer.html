<div class="ui-table-footer {{ class_name|default:'' }}">

    {% if total_count %}
      Mostrando {{ page_obj.start_index }}-{{ page_obj.end_index }} de {{ total_count }} {{ item_label_plural|default:"registros" }}

      Mostrando 0 {{ item_label_plural|default:"registros" }}
    {% endif %}
  </p>

  {% include "components/ui/pagination.html" %}
</div>
