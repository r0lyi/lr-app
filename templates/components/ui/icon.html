{% if name == "id-card" %}
  <svg viewBox="0 0 24 24" fill="none" focusable="false">
    <rect x="3.5" y="5" width="17" height="14" rx="3" stroke="currentColor" stroke-width="1.8"></rect>
    <path d="M8 11h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
    <path d="M8 14.75h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
    <circle cx="8" cy="8.5" r="1.35" stroke="currentColor" stroke-width="1.8"></circle>
  </svg>
{% elif name == "lock" %}
  <svg viewBox="0 0 24 24" fill="none" focusable="false">
    <rect x="5.5" y="10" width="13" height="9.5" rx="2.5" stroke="currentColor" stroke-width="1.8"></rect>
    <path d="M8 10V8.5a4 4 0 0 1 8 0V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
    <path d="M12 14.2v2.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
  </svg>
{% elif name == "eye" %}
  <svg viewBox="0 0 24 24" fill="none" focusable="false">
    <path d="M2.5 12s3.3-6 9.5-6 9.5 6 9.5 6-3.3 6-9.5 6-9.5-6-9.5-6Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
    <circle cx="12" cy="12" r="2.7" stroke="currentColor" stroke-width="1.8"></circle>
  </svg>
{% elif name == "eye-off" %}
  <svg viewBox="0 0 24 24" fill="none" focusable="false">
    <path d="M3.5 3.5l17 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
    <path d="M2.5 12s3.3-6 9.5-6 9.5 6 9.5 6-3.3 6-9.5 6-9.5-6-9.5-6Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
    <circle cx="12" cy="12" r="2.7" stroke="currentColor" stroke-width="1.8"></circle>
  </svg>
{% elif name == "arrow-right" %}
  <svg viewBox="0 0 24 24" fill="none" focusable="false">
    <path d="M5 12h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
    <path d="M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
  </svg>
{% endif %}
