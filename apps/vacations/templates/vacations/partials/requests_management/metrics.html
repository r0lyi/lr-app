<section class="rrhh-summary-grid" aria-label="Resumen de solicitudes">
  {% for metric in requests_metrics %}
    <article class="rrhh-summary-card rrhh-summary-card--{{ metric.theme }}">
      <div class="rrhh-summary-card__top">
        <p class="rrhh-summary-card__label">{{ metric.label }}</p>
        <span class="rrhh-summary-card__icon" aria-hidden="true">
          {% include "components/ui/icon.html" with name=metric.icon %}
        </span>
      </div>

      <div class="rrhh-summary-card__value-row{% if metric.is_range %} rrhh-summary-card__value-row--range{% endif %}">
        <strong class="rrhh-summary-card__value">{{ metric.value }}</strong>
        {% if metric.unit %}
          <span class="rrhh-summary-card__unit">{{ metric.unit }}</span>
        {% endif %}
      </div>

      <p class="rrhh-summary-card__note">{{ metric.note }}</p>
    </article>
  {% endfor %}
</section>
