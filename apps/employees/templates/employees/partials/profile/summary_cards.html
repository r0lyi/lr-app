<section class="dash-card">
  <div class="profile-summary-grid">
    <article class="profile-summary-card">
      <p class="profile-summary-card__label">Departamento</p>
      <p class="profile-summary-card__value">{{ employee_profile.department.name|default:"Sin departamento" }}</p>
    </article>
    <article class="profile-summary-card">
      <p class="profile-summary-card__label">Dias anuales acumulados</p>
      <p class="profile-summary-card__value">{{ employee_profile.available_days }}</p>
    </article>
    <article class="profile-summary-card">
      <p class="profile-summary-card__label">Dias tomados</p>
      <p class="profile-summary-card__value">{{ employee_profile.taken_days }}</p>
    </article>
  </div>
</section>
