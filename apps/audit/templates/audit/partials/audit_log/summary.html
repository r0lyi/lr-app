<section class="audit-log-summary">
  <article class="audit-log-summary__card">
    <span class="audit-log-summary__label">Actividad visible</span>
    <strong class="audit-log-summary__value">{{ total_visible_activity }}</strong>
  </article>
  <article class="audit-log-summary__card">
    <span class="audit-log-summary__label">Cambios de rol</span>
    <strong class="audit-log-summary__value">{{ visible_role_changes }}</strong>
  </article>
  <article class="audit-log-summary__card">
    <span class="audit-log-summary__label">Cambios de acceso</span>
    <strong class="audit-log-summary__value">{{ visible_access_changes }}</strong>
  </article>
  <article class="audit-log-summary__card">
    <span class="audit-log-summary__label">Cambios de departamento</span>
    <strong class="audit-log-summary__value">{{ visible_department_changes }}</strong>
  </article>
</section>
