{% extends "base.html" %}

{% block title %}Crear contraseña{% endblock %}

{% block content %}
<h1>Crear contraseña</h1>

<form method="post" action="{% url 'auth:set-password' token %}">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Guardar contraseña</button>
</form>
{% endblock %}
