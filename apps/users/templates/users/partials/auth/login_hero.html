{% load i18n static %}

<div class="login-hero">
  <div class="login-hero__overlay" aria-hidden="true"></div>

  <img
    src="{% static 'images/brand/logo500x200.png' %}"
    alt="{% translate 'LR Clean & Service' %}"
    class="login-hero__logo"
  >

  <div class="login-hero__content">
    <h1 class="login-hero__title">{% translate "Sistema de Vacaciones" %}</h1>
    <p class="login-hero__description">
      {% translate "Solicita, gestiona y aprueba días libres en segundos. Todo en una plataforma simple, transparente y eficiente." %}
    </p>
  </div>

  <img
    src="{% static 'images/oficina.jpg' %}"
    alt="{% translate 'Oficina de LR Clean & Service' %}"
    class="login-hero__image"
    loading="eager"
    fetchpriority="high"
    decoding="async"
  >
</div>
