<section class="admin-users-summary">
  <article class="admin-users-summary__card">
    <span class="admin-users-summary__label">Total usuarios</span>
    <strong class="admin-users-summary__value">{{ total_users }}</strong>
  </article>
  <article class="admin-users-summary__card">
    <span class="admin-users-summary__label">Cuentas activas</span>
    <strong class="admin-users-summary__value">{{ active_users }}</strong>
  </article>
  <article class="admin-users-summary__card">
    <span class="admin-users-summary__label">Cuentas inactivas</span>
    <strong class="admin-users-summary__value">{{ inactive_users }}</strong>
  </article>
  <article class="admin-users-summary__card">
    <span class="admin-users-summary__label">Fichas de empleado</span>
    <strong class="admin-users-summary__value">{{ total_employee_profiles }}</strong>
  </article>
</section>
